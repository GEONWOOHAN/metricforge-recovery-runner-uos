name: MetricForge recovery runner
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  actions: write
jobs:
  configure-oidc-subject:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Configure OIDC subject for reusable workflow trust
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${OWNER_REPO}/actions/oidc/customization/sub"
          body='{"use_default":false,"include_claim_keys":["job_workflow_ref"]}'
          code=$(curl -sS -L -o /tmp/oidc-put.out -w "%{http_code}"             -X PUT             -H "Accept: application/vnd.github+json"             -H "Authorization: Bearer ${GH_TOKEN}"             -H "X-GitHub-Api-Version: 2022-11-28"             "$api"             -d "$body")
          cat /tmp/oidc-put.out || true
          echo "PUT_HTTP=${code}"
          case "$code" in
            2*) ;;
            *) exit 1 ;;
          esac

  recover:
    needs: configure-oidc-subject
    uses: yulmwu/metricforge-recovery-workflows/.github/workflows/restore.yml@5be464357414ea179e4c71185c9bee88d44ded33
    permissions:
      id-token: write
      contents: read
    with:
      mode: exchange
      nonce: participant
      entry_role: arn:aws:iam::125746528491:role/metricforge-entry-b8358a07fc
